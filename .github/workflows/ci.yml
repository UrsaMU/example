name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, format, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type-check
        run: deno check src/main.ts

      - name: Test
        run: deno test --allow-env --allow-read --allow-write tests/gm_schema.test.ts tests/gm_logic.test.ts tests/gm_urban_shadows.test.ts tests/gm_compressor.test.ts
